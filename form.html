      const [id, en, ar, type, required] = field;

        return `

            <label for="${id}">${label(en, ar)} ${required ? "<span>*</span>" : ""}</label>
            <textarea id="${id}" ${required ? "required" : ""}></textarea>
          </div>

      return `
        <div class="field">
          <label for="${id}">${label(en, ar)} ${required ? "<span>*</span>" : ""}</label>
          <input id="${id}" type="${type}" ${required ? "required" : ""}/>
        </div>

    }

      return `

          <div class="rating-row">
            ${[1,2,3,4,5].map(num => `

                <span>${num}</span>
              </label>
            `).join("")}
          </div>
        </div>
      `;
    }

    function getRadioValue(name) {
      const checked = document.querySelector(`input[name="${name}"]:checked`);
      return checked ? Number(checked.value) : 0;
    }

    function getFieldValue(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function calculateGiftScores() {
      const scores = {};

      Object.keys(giftSections).forEach(sectionKey => {
        scores[sectionKey] = giftSections[sectionKey].questions.reduce((sum, q) => {
          return sum + getRadioValue(q[0]);
        }, 0);
      });

      return scores;
    }

    function calculateMinistryScores() {
      const scores = {};

      ministryQuestions.forEach(q => {
        scores[q[0]] = getRadioValue(q[0]);
      });

      return scores;
    }

    function getTopEntries(scoreObject) {
      return Object.entries(scoreObject).sort((a, b) => b[1] - a[1]);
    }

    function buildBilingualAnswers() {
      const trainee = {};
      traineeFields.forEach(([id, en, ar]) => {
        trainee[id] = {
          fieldEnglish: en,
          fieldArabic: ar,
          value: getFieldValue(id)

      });

      const faith = {};
      textQuestions.forEach(([id, en, ar]) => {
        faith[id] = {
          questionEnglish: en,
          questionArabic: ar,
          answer: getFieldValue(id)
        };
      });

      const vision = {};
      visionQuestions.forEach(([id, en, ar]) => {
        vision[id] = {
          questionEnglish: en,
          questionArabic: ar,
          answer: getFieldValue(id)
        };
      });

      const gifts = {};
      Object.keys(giftSections).forEach(sectionKey => {
        gifts[sectionKey] = {
          sectionEnglish: giftSections[sectionKey].en,
          sectionArabic: giftSections[sectionKey].ar,
          questions: {}
        };

        giftSections[sectionKey].questions.forEach(([id, en, ar]) => {
          gifts[sectionKey].questions[id] = {
            questionEnglish: en,
            questionArabic: ar,
            score: getRadioValue(id)
          };
        });
      });

      const ministry = {};
      ministryQuestions.forEach(([id, en, ar]) => {
        ministry[id] = {
          areaEnglish: en,
          areaArabic: ar,
          score: getRadioValue(id)
        };
      });

      return { trainee, faith, gifts, ministry, vision };
    }

    function buildResult(giftScores, ministryScores) {
      const sortedGifts = getTopEntries(giftScores);
      const sortedMinistry = getTopEntries(ministryScores);

      const primaryGiftKey = sortedGifts[0][0];
      const secondaryGiftKey = sortedGifts[1][0];
      const topMinistryKey = sortedMinistry[0][0];

      const topMinistryData = ministryQuestions.find(q => q[0] === topMinistryKey);

      return {
        English: {
          primaryGift: giftRecommendations[primaryGiftKey].en,
          secondaryGift: giftRecommendations[secondaryGiftKey].en,
          recommendedMinistry: topMinistryData[1],
          summary: `The strongest result is ${giftRecommendations[primaryGiftKey].en}. The secondary result is ${giftRecommendations[secondaryGiftKey].en}. The most aligned ministry area is ${topMinistryData[1]}.`
        },
        Arabic: {
          primaryGift: giftRecommendations[primaryGiftKey].ar,
          secondaryGift: giftRecommendations[secondaryGiftKey].ar,
          recommendedMinistry: topMinistryData[2],
          summary: `أقوى نتيجة هي ${giftRecommendations[primaryGiftKey].ar}. النتيجة الثانوية هي ${giftRecommendations[secondaryGiftKey].ar}. مجال الخدمة الأكثر توافقاً هو ${topMinistryData[2]}.`
        }
      };
    }

    function buildFullReport(answers, giftScores, ministryScores, result, submittedAt) {
      const language = currentLanguage;
      const rl = reportLabels[language];
      const langResult = result[language];
      const separator = "=========================================";
      const sectionSeparator = "-------------------------------";

      const traineeLines = traineeFields.map(([id]) => {
        const item = answers.trainee[id];
        const fieldLabel = selectedText(item.fieldEnglish, item.fieldArabic);
        return `${fieldLabel}: ${item.value || rl.notAvailable}`;
      });

      const faithLines = textQuestions.map(([id]) => {
        const item = answers.faith[id];
        const question = selectedText(item.questionEnglish, item.questionArabic);
        return `${question}\n${rl.answer}: ${item.answer || rl.notAvailable}`;
      });

      const giftLines = Object.keys(giftSections).map(sectionKey => {
        const section = answers.gifts[sectionKey];
        const sectionTitle = selectedText(section.sectionEnglish, section.sectionArabic);

        const questionLines = Object.keys(section.questions).map(questionKey => {
          const item = section.questions[questionKey];
          const question = selectedText(item.questionEnglish, item.questionArabic);
          return `  ${questionKey}. ${question}\n  ${rl.score}: ${item.score}/5`;
        });

        return `${sectionTitle}\n${rl.totalScore}: ${giftScores[sectionKey]}/25\n${questionLines.join("\n\n")}`;
      });

      const ministryLines = ministryQuestions.map(([id]) => {
        const item = answers.ministry[id];
        const areaLabel = selectedText(item.areaEnglish, item.areaArabic);
        return `${areaLabel}: ${item.score}/5`;
      });

      const visionLines = visionQuestions.map(([id]) => {
        const item = answers.vision[id];
        const question = selectedText(item.questionEnglish, item.questionArabic);
        return `${question}\n${rl.answer}: ${item.answer || rl.notAvailable}`;
      });

      return [
        rl.title,
        separator,
        "",
        `${rl.submittedAt}: ${submittedAt}`,
        `${rl.interfaceLanguageUsed}: ${language}`,
        "",
        rl.traineeInfo,
        sectionSeparator,
        traineeLines.join("\n"),
        "",
        rl.assessmentResults,
        sectionSeparator,
        `${rl.primaryGift}: ${langResult.primaryGift}`,
        `${rl.secondaryGift}: ${langResult.secondaryGift}`,
        `${rl.recommendedMinistry}: ${langResult.recommendedMinistry}`,
        "",
        `${rl.summary}:`,
        langResult.summary,
        "",
        rl.faithJourney,
        sectionSeparator,
        faithLines.join("\n\n"),
        "",
        rl.personalGifts,
        sectionSeparator,
        giftLines.join("\n\n"),
        "",
        rl.ministryAlignment,
        sectionSeparator,
        ministryLines.join("\n"),
        "",
        rl.callingVision,
        sectionSeparator,
        visionLines.join("\n\n")
      ].join("\n");
    }

    function buildEmailBaseParams(answers, result, submittedAt, fullReport) {
      const langResult = result[currentLanguage];

      return {
        fullName: answers.trainee.fullName.value || reportLabels[currentLanguage].notAvailable,
        surveyDate: answers.trainee.surveyDate.value || reportLabels[currentLanguage].notAvailable,
        age: answers.trainee.age.value || reportLabels[currentLanguage].notAvailable,
        interfaceLanguageUsed: currentLanguage,
        submittedAt,
        primaryGift: langResult.primaryGift,
        secondaryGift: langResult.secondaryGift,
        recommendedMinistry: langResult.recommendedMinistry,
        fullReport
      };
    }

    async function sendAssessmentEmails(emailBaseParams) {
      const emailRequests = TARGET_EMAILS.map(targetEmail => {
        return emailjs.send(
          EMAILJS_SERVICE_ID,
          EMAILJS_TEMPLATE_ID,
          {
            ...emailBaseParams,
            to_email: targetEmail
          }
        );
      });

      await Promise.all(emailRequests);
    }

    function showResult(result, giftScores, ministryScores) {
      const box = document.getElementById("resultBox");
      const langResult = result[currentLanguage];

      box.classList.remove("hidden");
      box.innerHTML = `
        <h2>${t("resultTitle")}</h2>

        <div class="result-grid">
          <div class="result-card">
            <span>${t("topGift")}</span>
            <strong>${langResult.primaryGift}</strong>
          </div>
          <div class="result-card">
            <span>${t("secondGift")}</span>
            <strong>${langResult.secondaryGift}</strong>
          </div>
          <div class="result-card">
            <span>${t("topMinistry")}</span>
            <strong>${langResult.recommendedMinistry}</strong>
          </div>
        </div>

        <p class="result-summary">${langResult.summary}</p>

        <h3>${currentLanguage === "English" ? "Gift Scores" : "نتائج المواهب"}</h3>
        <ul class="score-list">
          ${Object.keys(giftScores).map(key => `
            <li>
              <span>${label(giftSections[key].en, giftSections[key].ar)}</span>
              <strong>${giftScores[key]} / 25</strong>
            </li>
          `).join("")}
        </ul>

        <h3>${currentLanguage === "English" ? "Ministry Scores" : "نتائج مجالات الخدمة"}</h3>
        <ul class="score-list">
          ${ministryQuestions.map(([id, en, ar]) => `
            <li>
              <span>${label(en, ar)}</span>
              <strong>${ministryScores[id]} / 5</strong>
            </li>
          `).join("")}
        </ul>
      `;

      box.scrollIntoView({ behavior: "smooth" });
    }

    async function handleSubmit(event) {
      event.preventDefault();

      const form = event.target;
      const submitBtn = document.getElementById("submitBtn");

      if (!form.checkValidity()) {
        alert(t("required"));
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = t("submitting");

      const submittedAt = new Date().toLocaleString("en-CA", {
        timeZone: "America/Toronto",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });

      const answers = buildBilingualAnswers();
      const giftScores = calculateGiftScores();
      const ministryScores = calculateMinistryScores();
      const result = buildResult(giftScores, ministryScores);
      const fullReport = buildFullReport(answers, giftScores, ministryScores, result, submittedAt);
      const emailBaseParams = buildEmailBaseParams(answers, result, submittedAt, fullReport);

      const record = {
        tableNameEquivalent: "form",
        createdAt: Date.now(),
        createdAtISO: new Date().toISOString(),
        createdAtEasternTime: submittedAt,
        interfaceLanguageUsed: currentLanguage,
        notificationRecipients: TARGET_EMAILS,
        fields: answers,
        scores: {
          gifts: giftScores,
          ministry: ministryScores
        },
        results: result
      };

      try {
        await push(ref(database, "form/"), record);
        await sendAssessmentEmails(emailBaseParams);
        showResult(result, giftScores, ministryScores);
      } catch (error) {
        console.error(error);
        alert(t("error"));
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = t("submit");
      }
    }

    window.addEventListener("DOMContentLoaded", renderForm);
  </script>

  <style>
    :root {
      --bg: #f5f4f0;

      --border: #ddd;
      --soft: #f8eeee;
      --shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
      --radius-xl: 22px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(139, 30, 30, 0.08), transparent 34rem),

      overflow-x: hidden;
    }

    input,
    textarea,

    }

    }

      justify-content: flex-start;
    }

      position: relative;

      margin-bottom: 24px;

    }

    label {
      display: block;

    }

    label span {
      color: var(--accent);
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 1rem;
      background: #fff;
      color: var(--text);
      outline: none;

    }

    textarea {
      min-height: 112px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(139, 30, 30, 0.12);
    }

    .scale {

    }

      margin-top: 18px;

      border: 1px solid var(--border);

      margin: 0 0 14px;
      color: #333;
    }

    .rating-row {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .rating-option {
      position: relative;
      display: grid;
      place-items: center;
      margin: 0;
      min-height: 48px;
      border: 1px solid var(--border);
      border-radius: 14px;

      background: #fafafa;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      user-select: none;
    }

    .rating-option:hover {
      transform: translateY(-1px);
      border-color: rgba(139, 30, 30, 0.45);
      box-shadow: 0 4px 12px rgba(139, 30, 30, 0.12);
    }

    .rating-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .rating-option span {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      font-weight: bold;
      color: #444;
    }

    .rating-option:has(input:checked) {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 8px 18px rgba(139, 30, 30, 0.22);
    }

    .rating-option:has(input:checked) span {
      color: #fff;
    }

    .submit-btn,
    .lang-btn {
      border: none;
      background: var(--accent);
      color: white;
      padding: 14px 20px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(139, 30, 30, 0.24);
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;

    .lang-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(139, 30, 30, 0.28);
    }

      cursor: not-allowed;
      opacity: 0.72;
      transform: none;
    }

    .submit-btn {
      width: 100%;
      min-height: 56px;
      font-size: 1.08rem;
      border-radius: 18px;
      margin-bottom: 24px;
    }

      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));

      border: 1px solid rgba(139, 30, 30, 0.12);

    .result-card span {
